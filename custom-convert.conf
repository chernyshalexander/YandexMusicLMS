# Yandex Music plugin: encrypted MP4 container streaming transcoding
# _sysread() decrypts data on-the-fly, LMS pipes decrypted stream to ffmpeg via stdin

# ymf = FLAC in MP4 container (flac-mp4)
ymf flc * *
	[ffmpeg] -loglevel quiet -i - -f flac -

# yma = AAC in MP4 container (aac-mp4, he-aac-mp4)
# Transcode to FLAC: lossless container, no additional quality loss vs AAC source.
# With canEnhanceHTTP=2, full MP4 is buffered before ffmpeg reads it,
# so output pipe filling only throttles ffmpeg — Yandex connection is already closed.
yma flc * *
	[ffmpeg] -loglevel quiet -i - -vn -f flac -

# Fallback: transcode to MP3 for players that don't support FLAC
yma mp3 * *
	[ffmpeg] -loglevel quiet -i - -vn -q:a 0 -f mp3 -
