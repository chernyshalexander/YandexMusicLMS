# Yandex Music plugin: FLAC in MP4 container (flac-mp4) streaming transcoding
# ymf = custom format code for encrypted flac-mp4 streams
# ProtocolHandler._sysread() decrypts data on-the-fly, LMS pipes to ffmpeg via stdin

ymf flc * *
	[ffmpeg] -loglevel quiet -i - -f flac -

# Fallback transcoders for AAC-MP4 from Yandex Music (when faad unavailable)
# Яндекс может вернуть AAC в MP4 для Transporter/Boom, которые не поддерживают mp4 natively
# Эти правила более специфичны и имеют приоритет над convert.conf

mp4 mp3 * *
	[ffmpeg] -loglevel quiet -i - -f mp3 -q:a 5 -

mp4 pcm * *
	[ffmpeg] -loglevel quiet -i - -f s16le -

mp4 flc * *
	[ffmpeg] -loglevel quiet -i - -f flac -
