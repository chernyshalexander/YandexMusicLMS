# Yandex Music plugin: encrypted MP4 container streaming transcoding
# _sysread() decrypts data on-the-fly, LMS pipes decrypted stream to ffmpeg via stdin

# ymf = FLAC in MP4 container (flac-mp4)
ymf flc * *
	[ffmpeg] -loglevel quiet -i - -f flac -

# yma = AAC in MP4 container (aac-mp4, he-aac-mp4)
# ffmpeg demuxes MP4 → raw AAC ADTS bitstream, which hardware players support natively
yma aac * *
	[ffmpeg] -loglevel quiet -i - -vn -c:a copy -f adts -
